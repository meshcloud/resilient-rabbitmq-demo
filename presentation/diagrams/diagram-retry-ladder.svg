<svg xmlns="http://www.w3.org/2000/svg" width="780" height="560" viewBox="0 0 780 560">
<rect width="780" height="560" fill="#ffffff"/>

<!-- Consumer fails -->
<rect x="300" y="10" width="180" height="36" fill="#fff0f0" rx="6" stroke="#e74c3c" stroke-width="2"/>
<text x="390" y="33" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#e74c3c" font-weight="bold" text-anchor="middle">Consumer fails</text>
<line x1="390" y1="46" x2="390" y2="69" stroke="#27B8D2" stroke-width="2"/>
<polygon points="390,79 384,67 396,67" fill="#27B8D2"/>
<text x="398" y="63" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#27B8D2" font-style="italic" font-weight="bold" text-anchor="start">Interceptor</text>

<!-- Retry Ladder container: y=79, h=237, bottom=316 -->
<rect x="28" y="79" width="724" height="237" fill="#f0f9fb" rx="8" stroke="#27B8D2" stroke-width="2"/>
<text x="390" y="104" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#27B8D2" font-weight="bold" text-anchor="middle">Retry Ladder</text>
<text x="390" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#718096" font-style="italic" text-anchor="middle">no consumer on all queues</text>

<!-- retry-1: y=134, h=26 -->
<rect x="46" y="134" width="130" height="26" fill="#ffffff" rx="4" stroke="#27B8D2" stroke-width="1"/>
<text x="111" y="152" font-family="'Courier New', monospace" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-1</text>
<line x1="176" y1="147" x2="540" y2="147" stroke="#27B8D2" stroke-width="1" stroke-dasharray="6,3"/>
<text x="358" y="143" font-family="'Courier New', monospace" font-size="16" fill="#27B8D2" text-anchor="middle">wait   1 min</text>

<!-- retry-2: y=170, h=26 -->
<rect x="46" y="170" width="130" height="26" fill="#ffffff" rx="4" stroke="#27B8D2" stroke-width="1"/>
<text x="111" y="188" font-family="'Courier New', monospace" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-2</text>
<line x1="176" y1="183" x2="540" y2="183" stroke="#27B8D2" stroke-width="1" stroke-dasharray="6,3"/>
<text x="358" y="179" font-family="'Courier New', monospace" font-size="16" fill="#27B8D2" text-anchor="middle">wait   5 min</text>

<!-- retry-3: y=206, h=26 -->
<rect x="46" y="206" width="130" height="26" fill="#ffffff" rx="4" stroke="#27B8D2" stroke-width="1"/>
<text x="111" y="224" font-family="'Courier New', monospace" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-3</text>
<line x1="176" y1="219" x2="540" y2="219" stroke="#27B8D2" stroke-width="1" stroke-dasharray="6,3"/>
<text x="358" y="215" font-family="'Courier New', monospace" font-size="16" fill="#27B8D2" text-anchor="middle">wait  30 min</text>

<!-- retry-4: y=242, h=26 -->
<rect x="46" y="242" width="130" height="26" fill="#ffffff" rx="4" stroke="#27B8D2" stroke-width="1"/>
<text x="111" y="260" font-family="'Courier New', monospace" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-4</text>
<line x1="176" y1="255" x2="540" y2="255" stroke="#27B8D2" stroke-width="1" stroke-dasharray="6,3"/>
<text x="358" y="251" font-family="'Courier New', monospace" font-size="16" fill="#27B8D2" text-anchor="middle">wait   1 hr</text>

<!-- retry-5: y=278, h=26 -->
<rect x="46" y="278" width="130" height="26" fill="#ffffff" rx="4" stroke="#27B8D2" stroke-width="1"/>
<text x="111" y="296" font-family="'Courier New', monospace" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-5</text>
<line x1="176" y1="291" x2="540" y2="291" stroke="#27B8D2" stroke-width="1" stroke-dasharray="6,3"/>
<text x="358" y="287" font-family="'Courier New', monospace" font-size="16" fill="#27B8D2" text-anchor="middle">wait   8 hrs</text>

<!-- Right vertical collecting line -->
<line x1="540" y1="147" x2="540" y2="291" stroke="#27B8D2" stroke-width="2"/>

<!-- TTL expires badge -->
<rect x="548" y="205" width="140" height="28" fill="#FFF9DB" rx="5" stroke="#F5D547" stroke-width="1.5"/>
<text x="618" y="223" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1a1a2e" font-weight="bold" text-anchor="middle">⏰ TTL expires</text>

<!-- Arrow bends from right bar (x=540) down and left to centre (x=390) -->
<polyline points="540,291 540,330 390,330 390,349" fill="none" stroke="#27B8D2" stroke-width="2"/>
<text x="465" y="344" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#27B8D2" font-style="italic" font-weight="bold" text-anchor="middle">DLX</text>
<polygon points="390,359 384,347 396,347" fill="#27B8D2"/>

<!-- retry-wait-ended -->
<rect x="255" y="359" width="270" height="36" fill="#FFF9DB" rx="6" stroke="#F5D547" stroke-width="2"/>
<text x="390" y="382" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#1a1a2e" font-weight="bold" text-anchor="middle">retry-wait-ended</text>

<!-- Arrow: retry-wait-ended → Original Queue -->
<line x1="390" y1="395" x2="390" y2="411" stroke="#27B8D2" stroke-width="2"/>
<polygon points="390,421 384,409 396,409" fill="#27B8D2"/>
<text x="398" y="407" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#718096" font-style="italic" text-anchor="start">Listener that re-publishes</text>

<!-- Original Queue -->
<rect x="265" y="421" width="250" height="36" fill="#f0f9fb" rx="6" stroke="#27B8D2" stroke-width="2"/>
<text x="390" y="444" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#1a1a2e" font-weight="bold" text-anchor="middle">Original Queue</text>

<!-- Arrow: Original Queue → Consumer retries -->
<line x1="390" y1="457" x2="390" y2="471" stroke="#27B8D2" stroke-width="2"/>
<polygon points="390,481 384,469 396,469" fill="#27B8D2"/>

<!-- Consumer retries -->
<rect x="285" y="481" width="210" height="36" fill="#e8f8f0" rx="5" stroke="#27ae60" stroke-width="2"/>
<text x="390" y="504" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#1a5c38" font-weight="bold" text-anchor="middle">Consumer retries  ↺</text>
</svg>
