<svg xmlns="http://www.w3.org/2000/svg" width="860" height="160" viewBox="0 0 860 160">
<rect width="860" height="160" fill="#ffffff"/>
<text x="430" y="22" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#1a1a2e" font-weight="bold" font-style="normal" text-anchor="middle">Single queue with mixed TTLs:</text>
<rect x="30" y="36" width="260" height="52" fill="#fde8e8" rx="0" stroke="#e74c3c" stroke-width="1"/>
<text x="160" y="67" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1a1a2e" font-weight="normal" font-style="normal" text-anchor="middle">msg (30 min)</text>
<rect x="290" y="36" width="280" height="52" fill="#f0f9fb" rx="0" stroke="#27B8D2" stroke-width="1"/>
<text x="430" y="67" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1a1a2e" font-weight="normal" font-style="normal" text-anchor="middle">msg (5 min)</text>
<rect x="570" y="36" width="260" height="52" fill="#e8f8f0" rx="0" stroke="#27ae60" stroke-width="1"/>
<text x="700" y="67" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#1a1a2e" font-weight="normal" font-style="normal" text-anchor="middle">msg (1 min)</text>
<polygon points="30,100 20,92 18,108" fill="#27B8D2"/>
<text x="48" y="105" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#27B8D2" font-weight="normal" font-style="normal" text-anchor="start">head</text>
<polygon points="830,100 840,92 842,108" fill="#27B8D2"/>
<text x="810" y="105" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#27B8D2" font-weight="normal" font-style="normal" text-anchor="middle">tail</text>
<rect x="30" y="115" width="800" height="32" fill="#fff0f0" rx="5" stroke="#e74c3c" stroke-width="1"/>
<text x="430" y="134" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#e74c3c" font-weight="bold" font-style="normal" text-anchor="middle">msg(1min) is blocked until msg(30min) expires first — head-of-line blocking</text>
</svg>
