  <text x="700" y="185" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a2e">App Crash</text>
  <text x="700" y="218" text-anchor="middle" font-size="21" fill="#6b7280">Scheduler retries</text>
  <text x="700" y="246" text-anchor="middle" font-size="21" fill="#6b7280">unsent events</text>

